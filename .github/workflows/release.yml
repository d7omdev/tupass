name: Release

# Build standalone binaries and publish a GitHub Release whenever a version
# tag (v1.2.3) is pushed. Also runnable manually for dry-run builds.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fail fast on type/lint errors before spending time on the build matrix.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run validate

  # Compile a single-file executable on each native OS (so the correct OpenTUI
  # native renderer is bundled — cross-compiling would miss it).
  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-14
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: windows-latest
            target: windows-x64
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Compile binary
        shell: bash
        run: |
          bun build --compile --minify \
            src/index.tsx \
            --outfile "tupass-${{ matrix.target }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: tupass-${{ matrix.target }}
          path: tupass-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

  # Gather every binary and publish (or update) the release for this tag.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            artifacts/* \
            --title "tupass ${GITHUB_REF_NAME}" \
            --generate-notes
